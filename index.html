<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VoxToBox">
<meta name="theme-color" content="#08080f">
<title>VoxToBox</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #08080f;
  --surface: #0e0e1a;
  --border:  rgba(255,255,255,0.07);
  --accent:  #7c3aed;
  --accent2: #4f46e5;
  --text:    #e8e8f4;
  --muted:   rgba(232,232,244,0.35);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  overflow: hidden;
  user-select: none;
}

/* ── ÉCRANS ── */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity .35s ease, transform .35s ease;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
}
.screen.hidden { opacity:0; pointer-events:none; transform: translateY(20px); }

/* ── ÉCRAN ACCUEIL ── */
#home {
  gap: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(124,58,237,.12) 0%, transparent 70%),
              var(--bg);
}

.logo-zone {
  text-align: center;
  margin-bottom: 48px;
}
.logo-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.logo-title {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #fff 30%, rgba(124,58,237,.7));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.logo-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 10px;
  font-weight: 400;
  letter-spacing: .3px;
}

/* ── BOUTON VOIX ── */
.mic-btn {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  position: relative;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  box-shadow: 0 0 0 0 rgba(124,58,237,.4);
  transition: transform .15s, box-shadow .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 24px;
}
.mic-btn:active { transform: scale(.93); }
.mic-btn.listening {
  animation: pulse 1.5s ease infinite;
}
.mic-btn svg { width: 44px; height: 44px; color: white; }

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(124,58,237,.5); }
  70%  { box-shadow: 0 0 0 28px rgba(124,58,237,0); }
  100% { box-shadow: 0 0 0 0 rgba(124,58,237,0); }
}

.mic-hint {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: .3px;
}

/* ── ZONE TEXTE ── */
.input-zone {
  width: 100%;
  max-width: 360px;
  padding: 0 24px;
  margin-top: 32px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.intention-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  font-size: 16px;
  font-family: 'Syne', sans-serif;
  color: var(--text);
  outline: none;
  resize: none;
  min-height: 80px;
  transition: border-color .2s;
  line-height: 1.5;
}
.intention-input::placeholder { color: var(--muted); }
.intention-input:focus { border-color: rgba(124,58,237,.4); }

.generate-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  font-size: 16px;
  font-weight: 700;
  font-family: 'Syne', sans-serif;
  letter-spacing: .3px;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.generate-btn:active { transform: scale(.97); opacity: .85; }
.generate-btn:disabled { opacity: .4; cursor: default; transform: none; }

/* Sélecteur modèle */
.model-select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 14px;
  font-family: 'Syne', sans-serif;
  color: var(--muted);
  outline: none;
  -webkit-appearance: none;
}
.model-select option { background: #1a1a2e; color: var(--text); }

/* ── ÉTAT CHARGEMENT ── */
#loading {
  gap: 24px;
  background: var(--bg);
}

.loading-orb {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  animation: breathe 2s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: .8; }
  50%       { transform: scale(1.15); opacity: 1; }
}

.loading-text {
  font-size: 15px;
  color: var(--muted);
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
}
.loading-intention {
  font-size: 13px;
  color: rgba(124,58,237,.7);
  font-family: 'JetBrains Mono', monospace;
  text-align: center;
  max-width: 260px;
  font-style: italic;
}

/* Barre de progression */
.progress-bar {
  width: 200px;
  height: 2px;
  background: rgba(255,255,255,.06);
  border-radius: 1px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 1px;
  animation: progress 45s linear forwards;
  width: 0%;
}
@keyframes progress { to { width: 95%; } }

/* ── ÉCRAN RÉSULTAT ── */
#result {
  background: var(--bg);
  justify-content: flex-start;
  padding: 0;
}

.result-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  padding-top: calc(16px + var(--safe-top));
  background: rgba(8,8,15,.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 12px;
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .2s;
}
.back-btn:active { background: rgba(255,255,255,.06); }

.result-title {
  font-size: 13px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.action-btns {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .2s;
}
.icon-btn:active { background: rgba(124,58,237,.2); }

#result-iframe {
  flex: 1;
  width: 100%;
  border: none;
  display: block;
}

/* Barre du bas */
.result-footer {
  width: 100%;
  padding: 12px 20px;
  padding-bottom: calc(12px + var(--safe-bot));
  background: rgba(8,8,15,.9);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.footer-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .2s;
}
.footer-btn:active { background: rgba(124,58,237,.15); }
.footer-btn.primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-color: transparent;
}

/* ── TOASTS ── */
.toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bot));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(20,20,32,.95);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 13px;
  color: var(--text);
  pointer-events: none;
  opacity: 0;
  transition: all .3s;
  white-space: nowrap;
  backdrop-filter: blur(10px);
  z-index: 100;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Historique */
.history {
  width: 100%;
  max-width: 360px;
  padding: 0 24px;
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 120px;
  overflow-y: auto;
}
.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: border-color .2s, color .2s;
}
.history-item:active {
  border-color: rgba(124,58,237,.3);
  color: var(--text);
}
</style>
</head>
<body>

<!-- ── ÉCRAN ACCUEIL ── -->
<div class="screen" id="home">
  <div class="logo-zone">
    <div class="logo-eyebrow">Perceptech</div>
    <div class="logo-title">VoxToBox</div>
    <div class="logo-sub">L'informatique qui comprend le vivant</div>
  </div>

  <button class="mic-btn" id="micBtn" aria-label="Parler">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="11" rx="3"/>
      <path d="M19 10a7 7 0 0 1-14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="8" y1="22" x2="16" y2="22"/>
    </svg>
  </button>
  <div class="mic-hint" id="micHint">Appuie pour parler</div>

  <div class="input-zone">
    <textarea class="intention-input" id="intentionInput"
      placeholder="ou tape ton intention ici...&#10;un piano avec du son&#10;quelque chose pour méditer&#10;3h du matin..."
      rows="3"></textarea>
    <select class="model-select" id="modelSelect">
      <option value="llama">Llama 3.3 70B — rapide (~10s)</option>
      <option value="qwen_coder">Qwen 2.5 Coder 32B — meilleur (~60s)</option>
      <option value="qwen">Qwen 2.5 72B — équilibré (~20s)</option>
      <option value="deepseek">DeepSeek R1 70B — créatif (~40s)</option>
      <option value="mistral">Mistral Small 3.1 (~15s)</option>
    </select>
    <button class="generate-btn" id="generateBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Générer
    </button>
  </div>

  <div class="history" id="history"></div>
</div>

<!-- ── ÉCRAN CHARGEMENT ── -->
<div class="screen hidden" id="loading">
  <div class="loading-orb"></div>
  <div class="loading-text" id="loadingText">Génération en cours...</div>
  <div class="loading-intention" id="loadingIntention"></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- ── ÉCRAN RÉSULTAT ── -->
<div class="screen hidden" id="result">
  <div class="result-header">
    <button class="back-btn" id="backBtn" aria-label="Retour">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="result-title" id="resultTitle">Interface générée</div>
    <div class="action-btns">
      <button class="icon-btn" id="downloadBtn" aria-label="Télécharger">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
  </div>

  <iframe id="result-iframe"
    sandbox="allow-scripts allow-forms allow-same-origin allow-pointer-lock"
    title="Interface générée par VoxToBox">
  </iframe>

  <div class="result-footer">
    <button class="footer-btn" id="retryBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Régénérer
    </button>
    <button class="footer-btn primary" id="newBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle intention
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const HF_SPACE = 'https://bgman47-voxtobox.hf.space';

const MODELS = {
  llama:      'meta-llama/Llama-3.3-70B-Instruct',
  qwen_coder: 'Qwen/Qwen2.5-Coder-32B-Instruct',
  qwen:       'Qwen/Qwen2.5-72B-Instruct',
  deepseek:   'deepseek-ai/DeepSeek-R1-Distill-Llama-70B',
  mistral:    'mistralai/Mistral-Small-3.1-24B-Instruct-2503',
};

const TIMEOUTS = {
  llama: 90, qwen_coder: 180, qwen: 120, deepseek: 150, mistral: 90
};

const LOADING_MSGS = [
  'Génération en cours...',
  'L\'IA comprend ton intention...',
  'Construction de l\'interface...',
  'Presque prêt...',
];

// ── État
let currentHTML  = '';
let currentIntent = '';
let recognition  = null;
let msgInterval  = null;

// ── Éléments
const screens = {
  home:    document.getElementById('home'),
  loading: document.getElementById('loading'),
  result:  document.getElementById('result'),
};

function showScreen(name) {
  Object.entries(screens).forEach(([k, el]) => {
    el.classList.toggle('hidden', k !== name);
  });
}

// ── Toast
function toast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ── Historique
function saveHistory(intention) {
  const h = JSON.parse(localStorage.getItem('vtb_history') || '[]');
  const filtered = h.filter(i => i !== intention).slice(0, 8);
  filtered.unshift(intention);
  localStorage.setItem('vtb_history', JSON.stringify(filtered));
  renderHistory();
}

function renderHistory() {
  const h = JSON.parse(localStorage.getItem('vtb_history') || '[]');
  const el = document.getElementById('history');
  el.innerHTML = h.map(i =>
    `<div class="history-item" onclick="setIntention(${JSON.stringify(i)})">${i}</div>`
  ).join('');
}

function setIntention(text) {
  document.getElementById('intentionInput').value = text;
}

// ── Voix
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'fr-FR';
  r.interimResults = true;
  r.maxAlternatives = 1;
  return r;
}

document.getElementById('micBtn').addEventListener('click', () => {
  if (!recognition) {
    recognition = initSpeech();
    if (!recognition) {
      toast('Micro non disponible — tape ton intention');
      return;
    }
    recognition.onresult = e => {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript).join('');
      document.getElementById('intentionInput').value = transcript;
    };
    recognition.onend = () => {
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('micHint').textContent = 'Appuie pour parler';
      const val = document.getElementById('intentionInput').value.trim();
      if (val) generate(val);
    };
    recognition.onerror = () => {
      document.getElementById('micBtn').classList.remove('listening');
      document.getElementById('micHint').textContent = 'Appuie pour parler';
    };
  }
  recognition.start();
  document.getElementById('micBtn').classList.add('listening');
  document.getElementById('micHint').textContent = 'Écoute...';
});

// ── Génération via le Space HF
async function generate(intention) {
  if (!intention.trim()) { toast('Dis-moi ce que tu veux'); return; }

  const modelKey = document.getElementById('modelSelect').value;
  const modelId  = MODELS[modelKey];
  const timeout  = TIMEOUTS[modelKey];

  currentIntent = intention;
  saveHistory(intention);

  showScreen('loading');
  document.getElementById('loadingIntention').textContent = `"${intention}"`;

  // Réinitialiser la barre de progression
  const fill = document.getElementById('progressFill');
  fill.style.animation = 'none';
  fill.offsetHeight;
  fill.style.animation = `progress ${timeout * 0.9}s linear forwards`;

  // Messages rotatifs
  let msgIdx = 0;
  document.getElementById('loadingText').textContent = LOADING_MSGS[0];
  msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
    document.getElementById('loadingText').textContent = LOADING_MSGS[msgIdx];
  }, 4000);

  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeout * 1000);

    const modelLabel = modelKey === 'llama' ? 'Llama 3.3 70B' :
      modelKey === 'qwen_coder' ? 'Qwen 2.5 Coder 32B' :
      modelKey === 'qwen' ? 'Qwen 2.5 72B' :
      modelKey === 'deepseek' ? 'DeepSeek R1 70B' : 'Mistral Small 3.1';

    // Gradio 6 — appel en deux étapes : POST pour lancer, GET pour récupérer
    const postRes = await fetch(`${HF_SPACE}/gradio_api/call/generer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: [intention, modelLabel] }),
      signal: ctrl.signal
    });

    clearTimeout(timer);

    if (!postRes.ok) throw new Error(`API Error ${postRes.status}`);
    const { event_id } = await postRes.json();
    if (!event_id) throw new Error('Pas d\'event_id');

    // Récupérer le résultat via SSE
    const ctrl2 = new AbortController();
    const timer2 = setTimeout(() => ctrl2.abort(), timeout * 1000);

    const evtRes = await fetch(`${HF_SPACE}/gradio_api/call/generer/${event_id}`, {
      signal: ctrl2.signal
    });
    clearTimeout(timer2);

    if (!evtRes.ok) throw new Error(`SSE Error ${evtRes.status}`);

    const reader = evtRes.body.getReader();
    const decoder = new TextDecoder();
    let resultData = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const parsed = JSON.parse(line.slice(6));
            if (Array.isArray(parsed) && parsed[1]) {
              resultData = parsed[1];
            }
          } catch(e) {}
        }
      }
    }

    if (resultData) {
      currentHTML = resultData;
      showResult(intention, currentHTML);
    } else {
      throw new Error('Réponse invalide');
    }
  } catch (err) {
    clearInterval(msgInterval);
    showScreen('home');
    if (err.name === 'AbortError') {
      toast(`⏱ Timeout — essaie un modèle plus rapide`);
    } else {
      toast('❌ Erreur de génération');
      console.error(err);
    }
  } finally {
    clearInterval(msgInterval);
  }
}

function showResult(intention, html) {
  const iframe = document.getElementById('result-iframe');
  iframe.srcdoc = html;
  document.getElementById('resultTitle').textContent = intention;
  showScreen('result');
}

// ── Téléchargement
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!currentHTML) return;
  const b64 = btoa(unescape(encodeURIComponent(currentHTML)));
  const a = document.createElement('a');
  a.href = `data:text/html;base64,${b64}`;
  a.download = currentIntent.slice(0, 30).replace(/[^a-z0-9]/gi,'_') + '.html';
  a.click();
  toast('✓ Fichier téléchargé');
});

// ── Boutons
document.getElementById('generateBtn').addEventListener('click', () => {
  generate(document.getElementById('intentionInput').value.trim());
});

document.getElementById('intentionInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generate(e.target.value.trim());
  }
});

document.getElementById('backBtn').addEventListener('click', () => showScreen('home'));
document.getElementById('newBtn').addEventListener('click', () => {
  document.getElementById('intentionInput').value = '';
  showScreen('home');
});
document.getElementById('retryBtn').addEventListener('click', () => {
  generate(currentIntent);
});

// ── Service Worker
